[pytest]
pythonpath = . src

testpaths = tests
addopts = -m "not e2e" --import-mode=importlib
markers =
    e2e: requires EP-133 device via CoreMIDI

[coverage:run]
source = .
omit =
    tests/*
    scripts/*
    references/*
    captures/*
    */site-packages/*

[coverage:report]
show_missing = true
